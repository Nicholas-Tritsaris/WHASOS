# WHAOS GRUB Configuration
# For VirtualBox boot from ISO

set default=0
set timeout=5

# WHAOS boot entry
menuentry "WHAOS 1.0 (64-bit)" {
    linux /boot/vmlinuz-whacos root=live:LABEL=WHAOS_LIVE rootfstype=auto ro quiet splash
    initrd /boot/initramfs-whacos.img
}

# WHAOS boot entry - Installation mode
menuentry "WHAOS 1.0 Install" {
    linux /boot/vmlinuz-whacos root=live:LABEL=WHAOS_LIVE rootfstype=auto ro quiet splash whaos.install=1
    initrd /boot/initramfs-whacos.img
}

# Fallback / Recovery
menuentry "WHAOS 1.0 (Recovery)" {
    linux /boot/vmlinuz-whacos root=live:LABEL=WHAOS_LIVE rootfstype=auto ro single
    initrd /boot/initramfs-whacos.img
}
